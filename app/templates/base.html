<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Yields{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/main.css" />
  {% block head %}{% endblock %}
</head>
<body>
  {% if user %}
  <nav class="navbar">
    <a href="/properties" class="nav-brand">🏠 Yields</a>
    <div class="nav-links">
      <a href="/properties" class="nav-link">Mine eiendommer</a>
      <a href="/transactions/all" class="nav-link">Transaksjoner</a>
      <a href="/profile" class="nav-link">Min side</a>
      <a href="/auth/logout" class="btn btn-outline-sm">Logg ut</a>
    </div>
  </nav>
  {% endif %}

  <main class="main-content {% if not user %}main-centered{% endif %}">
    {% for msg in flash_messages %}
    <div class="alert alert-{{ msg.category }}">{{ msg.message }}</div>
    {% endfor %}

    {% block content %}{% endblock %}
  </main>

  <script src="/static/js/main.js"></script>
</body>
</html>
