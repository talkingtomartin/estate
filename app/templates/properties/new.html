{% extends "base.html" %}
{% block title %}Ny eiendom – Yields{% endblock %}
{% block content %}
<div class="page-header">
  <a href="/properties" class="back-link">← Mine eiendommer</a>
</div>

<div class="form-card">
  <h1>Legg til eiendom</h1>
  <form method="post" action="/properties/new" enctype="multipart/form-data" class="form">
    <div class="form-group">
      <label for="name">Navn *</label>
      <input type="text" id="name" name="name" required placeholder="F.eks. Leilighet Oslo sentrum" />
    </div>
    <div class="form-group">
      <label for="address">Adresse</label>
      <input type="text" id="address" name="address" placeholder="Storgata 1, 0123 Oslo" />
    </div>
    <div class="form-group">
      <label for="image">Bilde av eiendommen</label>
      <div class="file-upload-area" id="imageUploadArea">
        <input type="file" id="image" name="image" accept="image/*" class="file-input" />
        <div class="file-upload-label">
          <span class="file-upload-icon">📷</span>
          <span class="file-upload-text">Klikk for å laste opp bilde</span>
          <span class="file-upload-hint">JPG, PNG, WEBP – maks 5 MB</span>
        </div>
        <img id="imagePreview" class="image-preview hidden" src="" alt="Forhåndsvisning" />
      </div>
    </div>
    <div class="form-actions">
      <a href="/properties" class="btn btn-secondary">Avbryt</a>
      <button type="submit" class="btn btn-primary">Opprett eiendom</button>
    </div>
  </form>
</div>
{% endblock %}
